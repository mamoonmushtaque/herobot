<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HeroBot Login</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <div class="card">
    
    <div class="logo">🤖</div>
    <h2 class="login-title">HeroBot</h2>
    <p class="subtitle">Welcome to the Ethereal Professional</p>

    <button class="btn google"><img class="image-icon" src="google-logo.jpg"><b>Continue with Google</b></button>
    <button class="btn github"><img class="image-icon" src="download.png"><b>Continue with GitHub</b> </button>

    <div class="divider">──────── OR CONTINUE WITH EMAIL ────────</div>

    <form>
      <label>Email Address</label>
      <input type="email" placeholder="name@company.com">

      <div class="password-row">
        <label>Password</label>
        <a href="#"><b>Forgot password?</b></a>
      </div>
      <input type="password" placeholder="********">

      <button class="btn primary">Sign In</button>
    </form>

    <p class="signup">Don't have an account? <a href="#">Sign up</a></p>

  </div>

  <div class="footer-box">
    <p>
      ✔ HeroBot uses industry-grade security to secure your sessions. 
      By signing in, you agree to our standards and algorithmic privacy policies.
    </p>
  </div>

</div>

</body>
</html>
